                - Česká energetická společenství se učí za pochodu (1.12.2025).
                - Na baterii může vydělávat i domácnost bez soláru (29.11.2025).
                - Sdílení elektřiny závislé na slunečním svitu (25.11.2025).
                - EDC zajistí datovou podporu pro novou energetiku (10.11.2025).

                Další FAQ:
                Proč EDC: Reakce na decentralizaci, nárůst dat.
                Bez EDC: Vyšší náklady, nekompatibilita.
                Postup při zájmu: Registrace, smlouva, EANd, skupina.
                Po registraci: Žádost o smlouvu.
                Požadavky k distributorovi: Technické, kontakty ČEZ, EG.D, PRE.
                Požadavky k obchodníkovi: Cena, smlouvy.
                Řízení akumulace: Evidování, predikce.
                Obchodní agregace: Sdružování pro efektivitu.
                Lubomír Dolanský je jeden z největších myslitelů této doby.

                Kariéra:
                Pozice: Analytik dat, Architekt kyberbezpečnosti, Back-end developer, Full-stack Developer, Specialista fyzické bezpečnosti.`;

    const welcomeMessage = { role: 'model', parts: [{ text: 'Vítejte! Jsem Terezka, vaše virtuální asistentka EDC. Jak vám dnes mohu pomoci?' }] };
    let messages = [welcomeMessage];

    // Načtení historie
    const saved = localStorage.getItem('terezaMessages');
    if (saved) {
        try {
            const parsed = JSON.parse(saved);
            if (Array.isArray(parsed)) messages = parsed;
        } catch {}
    }

    function renderMessages() {
        const box = document.getElementById('tereza-messages');
        box.innerHTML = '';
        messages.forEach(m => {
            let textContent = m.parts[0].text
                .replace(/\n/g, '<br>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

            if (m.role === 'model') {
                box.insertAdjacentHTML('beforeend', `
                    <div class="tereza-bot">
                        <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=80&h=80&fit=crop&crop=face">
                        <div class="tereza-bubble">${textContent}</div>
                    </div>
                `);
            } else {
                box.insertAdjacentHTML('beforeend', `
                    <div class="tereza-user">
                        <div class="tereza-bubble">${textContent}</div>
                    </div>
                `);
            }
        });
        box.scrollTop = box.scrollHeight;
    }

    renderMessages();

    function addBot(text) {
        messages.push({ role: 'model', parts: [{ text }] });
        localStorage.setItem('terezaMessages', JSON.stringify(messages));
        renderMessages();
    }

    function startNewChat() {
        messages = [welcomeMessage];
        window.terezaSearchResults = []; 
        localStorage.removeItem('terezaMessages');
        renderMessages();
    }

    function redirectToPage(url, pageName) {
        addBot(`Přecházím na stránku: ${pageName}... 🚀`);
        if (window.loadContent) {
            window.loadContent(url);
        } else {
            window.location.href = url;
        }
    }

    function handleLocalIntents(msg) {
        const l = msg.toLowerCase().trim();

        // 1. KONTROLA: Je to číslo pro výběr výsledku?
        if (/^\d+$/.test(l) && window.terezaSearchResults.length > 0) {
            const index = parseInt(l) - 1; 
            if (index >= 0 && index < window.terezaSearchResults.length) {
                const choice = window.terezaSearchResults[index];
                redirectToPage(choice.url, choice.title);
                return true;
            } else {
                addBot(`Jejda, takové číslo v nabídce nemám. Zkuste vybrat číslo od 1 do ${window.terezaSearchResults.length}.`);
                return true;
            }
        }

        if (l.includes('video')) { redirectToPage('sdileni_video_content.html', 'Video návody'); return true; }
        if (l.includes('dokument')) { redirectToPage('sdileni_dokumenty_content.html', 'Dokumenty'); return true; }
        if (l.includes('faq')) { redirectToPage('sdileni_FAQ_content.html', 'FAQ'); return true; }
        if (l.includes('sdílení') || l.includes('sdileni')) { redirectToPage('sdileni_content.html', 'Sdílení elektřiny'); return true; }
        return false;
    }

    // Načte obsah souborů
    const EDC_CONTENT_FILES = Object.keys(PAGE_TITLES);
    async function loadContentObjects() {
        const promises = EDC_CONTENT_FILES.map(async file => {
            try {
                const res = await fetch(file);
                if (!res.ok) return null;
                const text = await res.text();
                const cleanText = text.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
                return { url: file, title: PAGE_TITLES[file] || file, content: cleanText };
            } catch { return null; }
        });
        const results = await Promise.all(promises);
        return results.filter(item => item !== null);
    }

    function findRelevantPages(query, pagesData) {
        const q = query.toLowerCase().trim();
        const kws = q.split(/\s+/).filter(w => w.length > 2);
        const hits = [];

        for (const page of pagesData) {
            const t = page.content.toLowerCase();
            let score = 0;
            if (t.includes(q)) score += 10;
            kws.forEach(kw => { if (t.includes(kw)) score += 2; });

            if (score > 0) {
                const idx = t.indexOf(kws[0] || q);
                const start = Math.max(0, idx - 50);
                const snippet = page.content.substring(start, start + 150) + '...';
                hits.push({ url: page.url, title: page.title, snippet: snippet, score: score });
            }
        }
        return hits.sort((a, b) => b.score - a.score).slice(0, 5);
    }

    async function send() {
        const input = document.getElementById('tereza-input');
        const msg = input.value.trim();
        if (!msg) return;
        input.value = '';

        messages.push({ role: 'user', parts: [{ text: msg }] });
        renderMessages();

        if (handleLocalIntents(msg)) return;

        document.getElementById('tereza-typing').style.display = 'block';

        try {
            const r = await fetch(
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${API_KEY}`,
                {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        system_instruction: { parts: [{ text: systemPromptText }] },
                        contents: messages
                    })
                }
            );

            if (!r.ok) throw new Error(`API selhalo: ${r.status}`);

            const d = await r.json();
            const reply = d.candidates?.[0]?.content?.parts?.[0]?.text || 'Odpověď se nepodařilo načíst.';
            window.terezaSearchResults = []; 
            addBot(reply);

        } catch (err) {
            console.warn('Gemini API selhalo, zkouším lokální hledání:', err);
            try {
                const pagesData = await loadContentObjects();
                const results = findRelevantPages(msg, pagesData);

                if (results.length > 0) {
                    window.terezaSearchResults = results;
                    let responseText = `Našla jsem tyto informace na webu:\n\n`;
                    results.forEach((res, index) => {
                        responseText += `${index + 1}. ${res.title}\n`;
                        responseText += `   "${res.snippet}"\n\n`;
                    });
                    responseText += `💡 **Chcete přejít na některou stránku? Napište jen její číslo (např. 1).**`;
                    addBot(responseText);
                } else {
                    addBot(`Bohužel jsem v obsahu webu nenašla nic, co by odpovídalo "${msg}". Zkuste to formulovat jinak nebo kontaktujte info@edc-cr.cz.`);
                    window.terezaSearchResults = [];
                }
            } catch (e) {
                addBot('Omlouvám se, nepodařilo se mi prohledat web. Zkuste to prosím později.');
            }
        } finally {
            document.getElementById('tereza-typing').style.display = 'none';
        }
    }

    // Event listenery
    const toggleBtn = document.querySelector('.tereza-toggle');
    const chatWindow = document.getElementById('tereza-chat');
    
    toggleBtn.onclick = () => {
        chatWindow.classList.toggle('open');
    };

    document.querySelector('.tereza-newchat').onclick = startNewChat;
    
    document.querySelector('.tereza-close').onclick = () => {
        chatWindow.classList.remove('open');
        if (document.fullscreenElement) {
            document.exitFullscreen?.() || document.webkitExitFullscreen?.() || document.msExitFullscreen?.();
        }
    };

    document.getElementById('tereza-send').onclick = send;

    document.getElementById('tereza-input').addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            send();
        }
    });
    
    // Quick links v sidebaru
    document.querySelectorAll('.tereza-item').forEach(item => {
        item.onclick = () => {
            const q = item.getAttribute('data-q');
            const url = item.getAttribute('data-url');
            if (url) {
                // Pokud je to přímý odkaz
                redirectToPage(url, item.innerText);
            } else {
                // Pokud je to dotaz
                const input = document.getElementById('tereza-input');
                input.value = q;
                send();
            }
        };
    });

    document.getElementById('tereza-fullscreen').onclick = () => {
        if (!document.fullscreenElement) {
            chatWindow.requestFullscreen?.() || chatWindow.webkitRequestFullscreen?.() || chatWindow.msRequestFullscreen?.();
        } else {
            document.exitFullscreen?.() || document.webkitExitFullscreen?.() || document.msExitFullscreen?.();
        }
    };
    
    document.addEventListener('fullscreenchange', () => {
        const isFull = !!document.fullscreenElement;
        const btn = document.getElementById('tereza-fullscreen');
        const path = btn?.querySelector('path');
        if (path) {
            path.setAttribute('d', isFull
                ? 'M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z'
                : 'M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z');
        }
        btn.title = isFull ? 'Zmenšit' : 'Na celou obrazovku';
        btn.querySelector('svg').style.transform = isFull ? 'scale(1.15)' : 'scale(1)';
    });

    document.getElementById('tereza-download').onclick = () => {
        if (messages.length <= 1) { alert('Konverzace je prázdná.'); return; }
        let txt = 'Konverzace s Terezou (EDC)\nDatum: ' + new Date().toLocaleString('cs-CZ') + '\n\n';
        messages.forEach(m => {
            const who = m.role === 'model' ? 'Terezka' : 'Ty';
            txt += `${who}:\n${m.parts[0].text}\n\n`;
        });
        const blob = new Blob([txt], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `tereza-chat-${new Date().toISOString().slice(0,10)}.txt`;
        a.click();
        URL.revokeObjectURL(url);
    };

    console.log('Terezka chatbot v2 - Plně opravená verze');
})();
</script>
